name: Publish documentation

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'diagram/**'
      - 'slides/**'
      - 'mkdocs.yml'
      - 'requirements.txt'
      - 'package.json'
      - 'package-lock.json'
      - 'slides/package.json'
      - 'slides/package-lock.json'
      - '.github/workflows/publish-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-docs
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install MkDocs
        run: pip install -r requirements.txt

      - name: Build docs
        run: mkdocs build --strict

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: slides/package-lock.json

      - name: Install Slidev
        working-directory: slides
        run: npm ci

      - name: Sync diagrams into slides public
        working-directory: slides
        run: npm run sync-diagrams

      - name: Build slides
        working-directory: slides
        run: npm run build -- --base /${{ github.event.repository.name }}/slides/

      - name: Install Playwright for PDF export
        working-directory: slides
        run: npx playwright install --with-deps chromium

      - name: Export slides PDF
        working-directory: slides
        run: npm run export

      - name: Merge slides into site
        run: mkdir -p site/slides && cp -r slides/dist/* site/slides/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
